# Complete CI Pipeline: Code → Build → Test → Scan → Artifact → Docker → ACR
trigger:
- main
- develop

pool:
  name: likhitha-b12  

variables:
  dockerRegistryServiceConnection: 'lal-acr-service' 
  dockerRegistry: 'lacrreg1.azurecr.io'  
  imageRepository: 'amazon-app'
  tag: '$(Build.BuildId)'
  DockerfilePath: '$(Build.SourcesDirectory)/Amazon/Dockerfile'
  sonarConnectionName: 'lal-sonarqube' 
  SONAR_HOST_URL: 'http://52.140.126.191:9000'  
  SONAR_TOKEN: sqa_48431100ba9caf587f947d18a2df48a37c9577dc 

steps:
# Step 1: Code Checkout
- checkout: self
  displayName: '1. Get Code from GitHub'

# Step 2: Build (Compile)
- task: Maven@3
  inputs:
    mavenPomFile: 'Amazon/pom.xml'
    goals: 'clean compile'
  displayName: '2. Build: Compile Code'

# Step 3: Test (Run tests)
- task: Maven@3
  inputs:
    mavenPomFile: 'Amazon/pom.xml'
    goals: 'test'
  displayName: '3. Test: Run Unit Tests'

# Step 4: Publish Test Results
- task: PublishTestResults@2
  inputs:
    testResultsFiles: 'Amazon/**/target/surefire-reports/TEST-*.xml'
    testRunTitle: 'JUnit Tests'
  displayName: '4. Publish Test Reports'

- powershell: |
    # Install Java 17 to agent's working directory (where agent has write access)
    $javaPath = "$(Agent.ToolsDirectory)\jdk17"
    
    if (-not (Test-Path $javaPath)) {
        Write-Host "Java 17 not found. Downloading and installing to $javaPath..."
        
        # Download Java 17
        $url = "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.12%2B7/OpenJDK17U-jdk_x64_windows_hotspot_17.0.12_7.zip"
        $zipPath = "$(Agent.TempDirectory)\jdk17.zip"
        
        Write-Host "Downloading from $url"
        Invoke-WebRequest -Uri $url -OutFile $zipPath
        
        # Extract to tools directory
        Write-Host "Extracting to $javaPath"
        Expand-Archive -Path $zipPath -DestinationPath "$(Agent.ToolsDirectory)" -Force
        
        # Find the extracted folder and rename if needed
        $extractedFolder = Get-ChildItem "$(Agent.ToolsDirectory)" -Directory | Where-Object {$_.Name -like "*jdk-17*"} | Select-Object -First 1
        if ($extractedFolder -and $extractedFolder.Name -ne "jdk17") {
            Write-Host "Renaming $($extractedFolder.Name) to jdk17"
            Rename-Item -Path $extractedFolder.FullName -NewName "jdk17" -ErrorAction SilentlyContinue
        }
        
        Write-Host "Java 17 installed successfully at $javaPath"
    } else {
        Write-Host "Java 17 already exists at $javaPath"
    }
    
    # Verify Java installation
    $javaExe = "$javaPath\bin\java.exe"
    if (Test-Path $javaExe) {
        & $javaExe -version
        Write-Host "##vso[task.setvariable variable=JAVA_HOME_17_X64]$javaPath"
        Write-Host "##vso[task.setvariable variable=PATH]$javaPath\bin;${env:PATH}"
        Write-Host "Java 17 setup complete!"
    } else {
        Write-Host "##vso[task.logissue type=error]Java installation failed - java.exe not found at $javaExe"
        exit 1
    }
  displayName: 'Install Java 17 in agent directory'

# Step 5: Code Scan (SonarQube)
- task: SonarQubePrepare@8
  inputs:
    SonarQube: '$(sonarConnectionName)'
    scannerMode: 'cli'
    configMode: 'manual'
    cliProjectKey: 'amazon-app'
    cliProjectName: 'Amazon App'
    cliSources: 'Amazon'
  displayName: '5.1 Prepare SonarQube Scan'

# CHANGE THIS: Build the application first (no sonar:sonar)
- task: Maven@3
  inputs:
    mavenPomFile: 'Amazon/pom.xml'
    goals: 'clean compile'  # Changed from 'sonar:sonar' to 'clean compile'
    options: '-DskipTests=true'  # Skip tests since you already ran them
  displayName: '5.2 Build Application for SonarQube'

# ADD THIS: Run the actual SonarQube analysis
- task: SonarQubeAnalyze@8
  inputs:
    jdkversion: 'JAVA_HOME_17_X64'
    extraProperties: |
      sonar.branch.name=
  displayName: '5.3 Run SonarQube Analysis'

- task: SonarQubePublish@8
  inputs:
    pollingTimeoutSec: '300'
  displayName: '5.4 Publish Scan Results'

# Step 6: Create Artifact (WAR file)
- task: Maven@3
  inputs:
    mavenPomFile: 'Amazon/pom.xml'
    goals: 'package'
    options: '-DskipTests'
  displayName: '6. Create WAR Artifact'

# Step 7: Build Docker Image
- task: Docker@2
  inputs:
    containerRegistry: '$(dockerRegistryServiceConnection)'
    repository: '$(imageRepository)'
    command: 'build'
    Dockerfile: '$(DockerfilePath)'
    tags: |
      $(tag)
      latest
    buildContext: '$(Build.SourcesDirectory)/Amazon'
  displayName: '7. Build Docker Image'

# Step 8: Push to Azure Container Registry (ACR)
- task: Docker@2
  inputs:
    containerRegistry: '$(dockerRegistryServiceConnection)'
    repository: '$(imageRepository)'
    command: 'push'
    tags: |
      $(tag)
      latest
  displayName: '8. Push Docker Image to ACR'